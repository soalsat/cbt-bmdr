<style>
  * { box-sizing: border-box; }

  :root {
    --primary: #8b3f1f;
    --primary-dark: #4a2413;
    --accent: #d59a5b;
    --accent-soft: #f5dfc7;
    --cream: #fff7ed;
    --paper: rgba(255, 248, 238, 0.96);
    --text: #3b2114;
    --muted: #7a4f32;
    --success: #2f7d32;
    --danger: #dc2626;
    --shadow: 0 18px 45px rgba(74, 36, 19, 0.18);
    --border: rgba(74, 36, 19, 0.18);
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 12% 18%, rgba(139, 63, 31, 0.28), transparent 22%),
      radial-gradient(circle at 88% 15%, rgba(213, 154, 91, 0.24), transparent 24%),
      radial-gradient(circle at 85% 85%, rgba(95, 58, 34, 0.22), transparent 26%),
      linear-gradient(135deg, #fff4e6 0%, #e7c196 42%, #a96132 100%);
    background-attachment: fixed;
    position: relative;
  }

  body::before {
    content: "Karapan Sapi   Batik Madura   Celurit   Sate Madura   Garam   Suramadu   Tanean Lanjhang   Sarong Madura   Ghȃncaran   Bhâsa Madhurâ";
    position: fixed;
    inset: 0;
    pointer-events: none;
    color: rgba(74, 36, 19, 0.075);
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 18px;
    line-height: 2.6;
    white-space: pre-wrap;
    padding: 34px;
    overflow: hidden;
    transform: rotate(-7deg) scale(1.08);
    transform-origin: center;
    z-index: 0;
  }

  body::after {
    content: "𑁍  ◖◗  𑁍  ◖◗  𑁍";
    position: fixed;
    left: -40px;
    right: -40px;
    bottom: 18px;
    pointer-events: none;
    color: rgba(74, 36, 19, 0.10);
    font-size: 64px;
    font-weight: 800;
    letter-spacing: 36px;
    text-align: center;
    white-space: nowrap;
    z-index: 0;
  }

  .container {
    max-width: 1120px;
    margin: auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 24px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.07;
    background:
      repeating-linear-gradient(
        45deg,
        transparent 0 18px,
        rgba(74,36,19,0.7) 18px 20px,
        transparent 20px 38px
      );
  }

  .card::after {
    content: "";
    position: absolute;
    inset: auto -40px -40px auto;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,63,31,0.25), transparent 68%);
    pointer-events: none;
  }

  .hidden { display: none !important; }
  .center { text-align: center; }

  h1, h2, h3 { margin-top: 0; }
  h1 {
    font-size: 36px;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
    color: #4a2413;
  }
  h2 { color: #5c2f18; }

  .school-title {
    max-width: 760px;
    margin: 0 auto 24px;
    padding: 18px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.76);
    border: 1px solid rgba(74,36,19,0.16);
    box-shadow: 0 12px 26px rgba(74,36,19,0.10);
    color: var(--muted);
    line-height: 1.45;
    position: relative;
    z-index: 1;
  }

  .school-title .school-kop {
    font-size: 12px;
    letter-spacing: .8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .school-title .school-name {
    font-size: 20px;
    font-weight: 800;
    color: #4a2413;
    margin-bottom: 6px;
  }

  .school-title .school-address { font-size: 13px; }

  #accessPage, #loginPage, #resultPage {
    max-width: 920px;
    margin: 12px auto 18px;
  }

  input, button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    border-radius: 16px;
    border: 1px solid #c9925a;
    font-size: 16px;
    position: relative;
    z-index: 1;
  }

  input {
    background: rgba(255,255,255,.94);
  }

  input:focus {
    outline: none;
    border-color: var(--primary-dark);
    box-shadow: 0 0 0 4px rgba(139,63,31,0.18);
  }

  .password-wrapper {
    position: relative;
    width: 100%;
    z-index: 1;
  }

  .password-wrapper input { padding-right: 56px; }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    box-shadow: none;
    color: #6b351b;
    cursor: pointer;
  }

  .toggle-password:hover {
    transform: translateY(-50%);
    background: rgba(139,63,31,.14);
  }

  .toggle-password svg {
    width: 22px;
    height: 22px;
  }

  button {
    border: none;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 18px rgba(74,36,19,.18);
    transition: .18s ease;
  }

  button:hover {
    filter: brightness(.98);
    transform: translateY(-1px);
  }

  button.secondary {
    background: #6b351b;
    box-shadow: none;
  }

  button.danger {
    background: #dc2626;
    box-shadow: none;
  }

  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .badge {
    background: linear-gradient(135deg, #4a2413, #8b3f1f);
    color: white;
    padding: 12px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 20px;
    text-align: center;
    min-width: 114px;
    position: relative;
    z-index: 1;
  }

  .meta {
    color: var(--muted);
    margin-top: 6px;
    position: relative;
    z-index: 1;
  }

  .hero-badge {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    color: #4a2413;
    background: linear-gradient(135deg, rgba(245,223,199,.82), rgba(139,63,31,.20));
    font-weight: 700;
    margin-bottom: 12px;
    border: 1px solid rgba(74,36,19,.16);
    position: relative;
    z-index: 1;
  }

  .question-number {
    display: inline-block;
    color: #4a2413;
    background: rgba(139,63,31,.14);
    font-weight: 700;
    padding: 8px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .question-text {
    font-size: 21px;
    line-height: 1.65;
    margin-bottom: 18px;
    white-space: pre-line;
    position: relative;
    z-index: 1;
  }

  .question-image {
    display: block;
    max-width: 680px;
    width: 100%;
    border-radius: 20px;
    margin: 8px auto 18px;
    border: 1px solid rgba(74,36,19,.16);
    box-shadow: 0 12px 28px rgba(74,36,19,.12);
    background: white;
    padding: 8px;
    position: relative;
    z-index: 1;
  }

  .option {
    display: block;
    padding: 15px;
    border: 1px solid #c9925a;
    border-radius: 16px;
    margin: 10px 0;
    cursor: pointer;
    background: rgba(255,255,255,0.86);
    transition: .18s;
    position: relative;
    z-index: 1;
  }

  .option:hover {
    background: rgba(139,63,31,.10);
    border-color: var(--primary);
  }

  .option input {
    width: auto;
    margin-right: 10px;
  }

  .option.selected {
    background: rgba(139,63,31,.16);
    border-color: var(--primary-dark);
    box-shadow: 0 8px 18px rgba(74,36,19,.1);
  }

  .option-image {
    display:block;
    max-width:220px;
    width:100%;
    margin:10px 0 0 32px;
    border:1px solid rgba(74,36,19,.2);
    border-radius:12px;
    background:#fff;
    padding:6px;
  }

  .data-table {
    width: min(520px, 100%);
    margin: 12px auto 20px;
    border-collapse: collapse;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 18px rgba(74,36,19,.1);
    font-size: 17px;
    position: relative;
    z-index: 1;
  }

  .data-table th, .data-table td {
    border: 1px solid #c9925a;
    padding: 12px 14px;
    text-align: center;
  }

  .data-table th {
    background: #e7c196;
    color: #4a2413;
    font-weight: 800;
  }

  .data-table td:first-child { text-align: left; }

  .extra-html {
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .passage-box {
    background: rgba(255, 244, 230, .72);
    border: 1px solid rgba(74,36,19,.18);
    border-radius: 16px;
    padding: 14px 16px;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 20px;
    position: relative;
    z-index: 1;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .nav-grid button {
    padding: 10px;
    color: #4a2413;
    background: #f5dfc7;
    box-shadow: none;
  }

  .nav-grid button.answered {
    background: #2f7d32;
    color: white;
  }

  .nav-grid button.active {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
  }

  .result-box {
    background: linear-gradient(135deg, rgba(245,223,199,.55), rgba(139,63,31,.18), rgba(213,154,91,.18));
    padding: 24px;
    border-radius: 22px;
    margin: 18px 0;
    font-size: 36px;
    font-weight: 700;
    color: #4a2413;
    position: relative;
    z-index: 1;
  }

  .result-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .status {
    color: var(--muted);
    font-weight: 700;
    min-height: 24px;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 720px) {
    .topbar, .actions, .result-actions {
      grid-template-columns: 1fr;
    }

    h1 { font-size: 29px; }

    .question-text {
      font-size: 18px;
    }

    .question-image {
      max-width:100%;
    }

    body::before {
      font-size: 30px;
      letter-spacing: 10px;
      line-height: 2.4;
    }

    body::after {
      font-size: 42px;
      letter-spacing: 20px;
    }
  }
</style>
